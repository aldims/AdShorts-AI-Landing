    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 500) rotate(8) scale(520 310)">
      <stop offset="0" stop-color="#6CA8FF" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#6CA8FF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#6CA8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1360 280) rotate(-16) scale(480 280)">
      <stop offset="0" stop-color="#C588FF" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#C588FF" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#C588FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamBlue" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6CA8FF" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#6CA8FF" stop-opacity="0.9"/>
      <stop offset="0.58" stop-color="#8BC9FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8BC9FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamViolet" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
