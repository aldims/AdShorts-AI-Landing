<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="topSpot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 120) rotate(90) scale(320 760)">
      <stop offset="0" stop-color="#E9F3FF" stop-opacity="0.2"/>
      <stop offset="0.35" stop-color="#CFE5FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#CFE5FF" stop-opacity="0"/>
